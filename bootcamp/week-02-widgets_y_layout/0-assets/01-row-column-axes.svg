<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ejes principal y transversal en Row y Column</title>
  <desc id="desc">Comparación visual: en Row el eje principal es horizontal y el transversal vertical; en Column es al revés</desc>
  <rect width="900" height="400" fill="#0d1117"/>

  <!-- Row example -->
  <text x="220" y="50" fill="#54C5F8" font-size="20" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">Row</text>
  <rect x="60" y="70" width="320" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="80" y="100" width="60" height="60" rx="6" fill="#0175C2"/>
  <rect x="160" y="100" width="60" height="60" rx="6" fill="#0175C2"/>
  <rect x="240" y="100" width="60" height="60" rx="6" fill="#0175C2"/>
  <line x1="60" y1="200" x2="380" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowg)"/>
  <text x="220" y="220" fill="#3fb950" font-size="13" text-anchor="middle" font-family="system-ui, sans-serif">eje principal (mainAxis) →</text>
  <line x1="40" y1="70" x2="40" y2="190" stroke="#d29922" stroke-width="2" marker-end="url(#arrowy)"/>
  <text x="20" y="130" fill="#d29922" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif" transform="rotate(-90 20 130)">crossAxis</text>

  <!-- Column example -->
  <text x="680" y="50" fill="#54C5F8" font-size="20" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">Column</text>
  <rect x="600" y="70" width="160" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="630" y="90" width="100" height="50" rx="6" fill="#0175C2"/>
  <rect x="630" y="160" width="100" height="50" rx="6" fill="#0175C2"/>
  <rect x="630" y="230" width="100" height="50" rx="6" fill="#0175C2"/>
  <line x1="680" y1="70" x2="680" y2="350" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowg)"/>
  <text x="800" y="210" fill="#3fb950" font-size="13" text-anchor="middle" font-family="system-ui, sans-serif" transform="rotate(90 800 210)">mainAxis ↓</text>
  <line x1="600" y1="365" x2="760" y2="365" stroke="#d29922" stroke-width="2" marker-end="url(#arrowy)"/>
  <text x="680" y="385" fill="#d29922" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">crossAxis</text>

  <text x="450" y="240" fill="#8b949e" font-size="13" text-anchor="middle" font-family="system-ui, sans-serif">MainAxisAlignment ≈ justify-content</text>
  <text x="450" y="260" fill="#8b949e" font-size="13" text-anchor="middle" font-family="system-ui, sans-serif">CrossAxisAlignment ≈ align-items</text>

  <defs>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowy" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d29922"/>
    </marker>
  </defs>
</svg>
