<svg width="820" height="420" viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Árbol de rutas con ShellRoute</title>
  <desc id="desc">GoRouter en la raíz, un ShellRoute que envuelve un Scaffold con NavigationBar persistente, y dos rutas hijas (Home y Acerca de) que intercambian solo el contenido</desc>
  <rect width="820" height="420" fill="#0d1117"/>

  <!-- GoRouter root -->
  <rect x="320" y="20" width="180" height="50" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="410" y="50" fill="#54C5F8" font-size="15" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">GoRouter</text>

  <line x1="410" y1="70" x2="410" y2="110" stroke="#30363d" stroke-width="2"/>

  <!-- ShellRoute -->
  <rect x="260" y="110" width="300" height="70" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5"/>
  <text x="410" y="140" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ShellRoute</text>
  <text x="410" y="160" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">Scaffold + NavigationBar (persistente)</text>

  <line x1="330" y1="180" x2="200" y2="230" stroke="#30363d" stroke-width="2"/>
  <line x1="490" y1="180" x2="620" y2="230" stroke="#30363d" stroke-width="2"/>

  <!-- Home route -->
  <rect x="80" y="230" width="240" height="70" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="200" y="258" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">GoRoute path: "/"</text>
  <text x="200" y="278" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">HomeScreen (child)</text>

  <!-- About route -->
  <rect x="500" y="230" width="240" height="70" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="620" y="258" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">GoRoute path: "/about"</text>
  <text x="620" y="278" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">AboutScreen (child)</text>

  <text x="410" y="350" fill="#8b949e" font-size="13" text-anchor="middle" font-family="system-ui, sans-serif">Al navegar entre "/" y "/about" con context.go(),</text>
  <text x="410" y="370" fill="#8b949e" font-size="13" text-anchor="middle" font-family="system-ui, sans-serif">solo cambia el "child" — el Scaffold del ShellRoute NO se reconstruye</text>

  <text x="410" y="400" fill="#d29922" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">⚠ usar context.go(), no push() — evita apilar tabs</text>
</svg>
