<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de ChangeNotifier: acción, mutación, notifyListeners y rebuild</title>
  <desc id="desc">Flujo circular: el usuario toca un widget, se llama un método del notifier, este muta estado privado y llama notifyListeners, lo que reconstruye solo los widgets suscritos con watch o Consumer</desc>
  <rect width="900" height="320" fill="#0d1117"/>

  <!-- Step 1 -->
  <rect x="40" y="120" width="180" height="80" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="130" y="150" fill="#54C5F8" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">1. Usuario toca</text>
  <text x="130" y="170" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">context.read&lt;T&gt;()</text>
  <text x="130" y="186" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">.toggle(id)</text>

  <line x1="220" y1="160" x2="290" y2="160" stroke="#3fb950" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Step 2 -->
  <rect x="300" y="120" width="180" height="80" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5"/>
  <text x="390" y="150" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">2. Notifier muta</text>
  <text x="390" y="170" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">estado privado</text>
  <text x="390" y="186" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">(_favoriteIds)</text>

  <line x1="480" y1="160" x2="550" y2="160" stroke="#3fb950" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Step 3 -->
  <rect x="560" y="120" width="180" height="80" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="650" y="150" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">3. notifyListeners()</text>
  <text x="650" y="170" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">avisa a suscriptores</text>

  <line x1="740" y1="160" x2="810" y2="160" stroke="#3fb950" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Step 4 -->
  <rect x="700" y="220" width="180" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="790" y="250" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">4. Rebuild</text>
  <text x="790" y="270" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">solo widgets con</text>
  <text x="790" y="286" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">watch/Consumer</text>

  <path d="M810 260 L810 300 L130 300 L130 200" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#a5)"/>
  <text x="450" y="245" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">el ciclo se repite en la siguiente interacción</text>

  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
    <marker id="a5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#30363d"/>
    </marker>
  </defs>
</svg>
