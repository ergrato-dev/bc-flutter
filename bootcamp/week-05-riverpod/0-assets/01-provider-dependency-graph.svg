<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Grafo de dependencias entre providers de Riverpod</title>
  <desc id="desc">itemsProvider y favoritesProvider son leídos por fullGreetingProvider-style composición; un ConsumerWidget observa ambos con ref.watch, sin pasar por BuildContext</desc>
  <rect width="880" height="380" fill="#0d1117"/>

  <!-- itemsProvider -->
  <rect x="60" y="60" width="220" height="70" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="170" y="88" fill="#54C5F8" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">itemsProvider</text>
  <text x="170" y="106" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">AsyncValue&lt;List&lt;Item&gt;&gt;</text>

  <!-- favoritesProvider -->
  <rect x="600" y="60" width="220" height="70" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="710" y="88" fill="#54C5F8" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">favoritesProvider</text>
  <text x="710" y="106" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">Set&lt;String&gt;</text>

  <!-- itemCountProvider (derived) -->
  <rect x="330" y="180" width="220" height="70" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5"/>
  <text x="440" y="208" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">favoriteItemsProvider</text>
  <text x="440" y="226" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">deriva de ambos (ref.watch)</text>

  <line x1="220" y1="130" x2="410" y2="180" stroke="#3fb950" stroke-width="2" marker-end="url(#g5)"/>
  <line x1="660" y1="130" x2="470" y2="180" stroke="#3fb950" stroke-width="2" marker-end="url(#g5)"/>

  <!-- ConsumerWidget -->
  <rect x="330" y="290" width="220" height="70" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="440" y="318" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ConsumerWidget</text>
  <text x="440" y="336" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, sans-serif">ref.watch(favoriteItemsProvider)</text>

  <line x1="440" y1="250" x2="440" y2="290" stroke="#3fb950" stroke-width="2" marker-end="url(#g5)"/>

  <text x="440" y="30" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">Sin BuildContext — la composición ocurre en el grafo de providers, no en el árbol de widgets</text>

  <defs>
    <marker id="g5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
  </defs>
</svg>
