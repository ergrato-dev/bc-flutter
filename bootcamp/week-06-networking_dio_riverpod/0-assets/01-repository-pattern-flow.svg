<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo del Repository Pattern con Dio y Riverpod</title>
  <desc id="desc">ConsumerWidget observa ItemsNotifier vía ref.watch; ItemsNotifier depende de ItemsRepository (interfaz); DioItemsRepository implementa la interfaz y usa Dio para llamar a la API REST. La UI y el Notifier nunca conocen Dio directamente.</desc>
  <rect width="900" height="260" fill="#0d1117"/>

  <text x="450" y="28" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">La UI y el Notifier nunca conocen Dio — solo el contrato ItemsRepository</text>

  <!-- ConsumerWidget -->
  <rect x="20" y="90" width="160" height="70" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="100" y="118" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ConsumerWidget</text>
  <text x="100" y="136" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">ref.watch(itemsProvider)</text>

  <line x1="180" y1="125" x2="220" y2="125" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ItemsNotifier -->
  <rect x="220" y="90" width="180" height="70" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="310" y="118" fill="#54C5F8" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ItemsNotifier</text>
  <text x="310" y="136" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">AsyncValue&lt;List&lt;Item&gt;&gt;</text>

  <line x1="400" y1="125" x2="440" y2="125" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ItemsRepository interface -->
  <rect x="440" y="90" width="200" height="70" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="540" y="112" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ItemsRepository</text>
  <text x="540" y="130" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">interfaz abstracta</text>
  <text x="540" y="146" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">fetchItems()</text>

  <line x1="540" y1="160" x2="540" y2="190" stroke="#3fb950" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="600" y="182" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">implementa</text>

  <!-- DioItemsRepository -->
  <rect x="440" y="190" width="200" height="60" rx="8" fill="#161b22" stroke="#02569B" stroke-width="1.5"/>
  <text x="540" y="215" fill="#54C5F8" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">DioItemsRepository</text>
  <text x="540" y="233" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">traduce DioException</text>

  <line x1="640" y1="220" x2="700" y2="220" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dio -->
  <rect x="700" y="190" width="80" height="60" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="740" y="225" fill="#54C5F8" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">Dio</text>

  <line x1="780" y1="220" x2="820" y2="220" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API REST -->
  <rect x="820" y="190" width="60" height="60" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="850" y="215" fill="#d29922" font-size="10" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">API</text>
  <text x="850" y="230" fill="#d29922" font-size="10" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">REST</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
  </defs>
</svg>
