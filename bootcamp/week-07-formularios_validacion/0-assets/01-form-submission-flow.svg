<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de envío de un formulario con FormBuilder, AsyncNotifier y Dio</title>
  <desc id="desc">El usuario presiona Enviar; saveAndValidate() valida el FormBuilder; si es válido, CreateItemNotifier.create() pasa a AsyncLoading, llama a ItemsRepository.createItem() vía Dio, y el resultado vuelve como AsyncData o AsyncError; la UI reacciona con ref.watch (deshabilitar campos) y ref.listen (SnackBar de éxito o error, invalidar itemsProvider).</desc>
  <rect width="900" height="280" fill="#0d1117"/>

  <text x="450" y="26" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">saveAndValidate() decide si el envío ocurre — la UI solo reacciona al AsyncValue resultante</text>

  <!-- FormBuilder -->
  <rect x="20" y="100" width="150" height="70" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="95" y="128" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">FormBuilder</text>
  <text x="95" y="146" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">saveAndValidate()</text>

  <line x1="170" y1="135" x2="205" y2="135" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="187" y="125" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">válido</text>

  <!-- CreateItemNotifier -->
  <rect x="205" y="90" width="190" height="90" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="300" y="115" fill="#54C5F8" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">CreateItemNotifier</text>
  <text x="300" y="132" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">create(item)</text>
  <text x="300" y="147" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">AsyncLoading →</text>
  <text x="300" y="162" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">AsyncValue.guard()</text>

  <line x1="395" y1="135" x2="430" y2="135" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ItemsRepository -->
  <rect x="430" y="100" width="180" height="70" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="520" y="122" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ItemsRepository</text>
  <text x="520" y="140" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">createItem(item)</text>

  <line x1="610" y1="135" x2="645" y2="135" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dio / API -->
  <rect x="645" y="100" width="70" height="70" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="680" y="140" fill="#54C5F8" font-size="13" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">Dio</text>

  <line x1="715" y1="135" x2="750" y2="135" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="750" y="100" width="60" height="70" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="780" y="130" fill="#d29922" font-size="10" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">API</text>
  <text x="780" y="145" fill="#d29922" font-size="10" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">REST</text>

  <!-- return path -->
  <line x1="300" y1="180" x2="300" y2="220" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- UI reacts -->
  <rect x="150" y="220" width="300" height="50" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="240" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">CreateItemScreen</text>
  <text x="300" y="256" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">ref.watch (isLoading) · ref.listen (SnackBar, invalidate)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
  </defs>
</svg>
