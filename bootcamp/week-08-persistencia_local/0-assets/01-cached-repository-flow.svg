<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de CachedItemsRepository: network-first con fallback a Hive</title>
  <desc id="desc">fetchItems() intenta la red vía DioItemsRepository; si tiene éxito, guarda el resultado en el Box de Hive y lo retorna a ItemsNotifier; si falla, lee el Box de Hive como fallback y retorna esos datos; si el Box también está vacío, relanza el error original.</desc>
  <rect width="900" height="300" fill="#0d1117"/>

  <text x="450" y="26" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">ItemsNotifier y HomeScreen no cambian — solo conocen el contrato ItemsRepository</text>

  <!-- ItemsNotifier -->
  <rect x="20" y="110" width="160" height="70" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="100" y="138" fill="#54C5F8" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">ItemsNotifier</text>
  <text x="100" y="156" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">fetchItems()</text>

  <line x1="180" y1="145" x2="215" y2="145" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CachedItemsRepository -->
  <rect x="215" y="90" width="220" height="110" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5"/>
  <text x="325" y="112" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">CachedItemsRepository</text>
  <text x="325" y="130" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">1. intenta _remote.fetchItems()</text>
  <text x="325" y="146" fill="#3fb950" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">✓ éxito → guarda en Box y retorna</text>
  <text x="325" y="162" fill="#d29922" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">✗ falla → lee Box como fallback</text>
  <text x="325" y="178" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">sin cache → rethrow</text>

  <line x1="435" y1="125" x2="470" y2="125" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="452" y="115" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">red</text>

  <!-- DioItemsRepository -->
  <rect x="470" y="90" width="170" height="70" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="555" y="118" fill="#54C5F8" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">DioItemsRepository</text>
  <text x="555" y="136" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">API REST vía Dio</text>

  <line x1="435" y1="170" x2="470" y2="170" stroke="#d29922" stroke-width="2" marker-end="url(#arrowY)"/>
  <text x="452" y="185" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">cache</text>

  <!-- Hive Box -->
  <rect x="470" y="190" width="170" height="70" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="555" y="218" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">Box (Hive)</text>
  <text x="555" y="236" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">items_cache</text>

  <!-- return path -->
  <line x1="325" y1="200" x2="325" y2="240" stroke="#3fb950" stroke-width="2"/>
  <line x1="325" y1="240" x2="140" y2="240" stroke="#3fb950" stroke-width="2"/>
  <line x1="140" y1="240" x2="140" y2="180" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="255" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">List&lt;Item&gt; (red o cache)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowY" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d29922"/>
    </marker>
  </defs>
</svg>
