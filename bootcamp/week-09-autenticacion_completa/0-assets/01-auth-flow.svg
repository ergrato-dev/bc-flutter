<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de autenticación: login, guardado seguro del token, y guard de rutas reactivo</title>
  <desc id="desc">LoginScreen llama a AuthNotifier.login(), que usa AuthRepository para hacer POST a dummyjson.com/auth/login y guarda el accessToken en flutter_secure_storage. appRouterProvider observa AuthNotifier vía ref.watch y reconstruye el GoRouter completo con el redirect correcto, llevando al usuario a HomeScreen. Logout borra el token y limpia el cache de semana 8, y el router vuelve a redirigir a LoginScreen.</desc>
  <rect width="900" height="300" fill="#0d1117"/>

  <text x="450" y="26" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, sans-serif">appRouterProvider observa AuthNotifier — un login o logout reconstruye el GoRouter completo</text>

  <!-- LoginScreen -->
  <rect x="20" y="110" width="150" height="70" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="95" y="138" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">LoginScreen</text>
  <text x="95" y="156" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">login(user, pass)</text>

  <line x1="170" y1="145" x2="205" y2="145" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AuthNotifier -->
  <rect x="205" y="90" width="180" height="110" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="295" y="112" fill="#54C5F8" font-size="12" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">AuthNotifier</text>
  <text x="295" y="130" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">1. AuthRepository.login()</text>
  <text x="295" y="146" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">2. guarda token en</text>
  <text x="295" y="162" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">   secure_storage</text>
  <text x="295" y="178" fill="#3fb950" font-size="10" text-anchor="middle" font-family="system-ui, sans-serif">state = AsyncData(token)</text>

  <line x1="385" y1="125" x2="420" y2="125" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="402" y="115" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">POST</text>

  <!-- dummyjson -->
  <rect x="420" y="90" width="150" height="60" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="495" y="115" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">dummyjson.com</text>
  <text x="495" y="133" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">/auth/login</text>

  <line x1="385" y1="170" x2="420" y2="170" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="402" y="185" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">write</text>

  <!-- secure storage -->
  <rect x="420" y="150" width="150" height="60" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="1.5"/>
  <text x="495" y="175" fill="#54C5F8" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">secure_storage</text>
  <text x="495" y="193" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">Keychain/Keystore</text>

  <!-- appRouterProvider -->
  <rect x="620" y="90" width="130" height="110" rx="8" fill="#161b22" stroke="#0175C2" stroke-width="1.5"/>
  <text x="685" y="115" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">appRouterProvider</text>
  <text x="685" y="133" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">ref.watch(authProvider)</text>
  <text x="685" y="149" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">reconstruye GoRouter</text>
  <text x="685" y="165" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">con redirect nuevo</text>

  <line x1="295" y1="200" x2="295" y2="240" stroke="#3fb950" stroke-width="2"/>
  <line x1="295" y1="240" x2="685" y2="240" stroke="#3fb950" stroke-width="2"/>
  <line x1="685" y1="240" x2="685" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="255" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">ref.watch (rebuild al cambiar auth)</text>

  <line x1="750" y1="145" x2="790" y2="145" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- HomeScreen -->
  <rect x="790" y="115" width="90" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="835" y="140" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif">HomeScreen</text>
  <text x="835" y="156" fill="#8b949e" font-size="9" text-anchor="middle" font-family="system-ui, sans-serif">o Login</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#54C5F8"/>
    </marker>
  </defs>
</svg>
