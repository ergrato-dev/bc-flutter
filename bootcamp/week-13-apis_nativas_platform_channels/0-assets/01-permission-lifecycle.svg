<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Diagrama del ciclo de vida de un permiso: notDetermined pasa a granted o denied al solicitarlo; denied puede volver a solicitarse o pasar a permanentlyDenied; permanentlyDenied solo se resuelve enviando al usuario a Ajustes con openAppSettings.">
  <rect width="820" height="400" fill="#12181f"/>

  <text x="410" y="38" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="20" font-weight="600" fill="#e8edf2">Ciclo de vida de un permiso</text>

  <!-- notDetermined -->
  <rect x="40" y="160" width="180" height="80" rx="12" fill="#1b232c" stroke="#54C5F8" stroke-width="2"/>
  <text x="130" y="195" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#e8edf2">denied</text>
  <text x="130" y="214" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="11" fill="#9fb0bf">(no determinado o pedido)</text>

  <!-- granted -->
  <rect x="320" y="70" width="180" height="80" rx="12" fill="#0175C2" stroke="#54C5F8" stroke-width="2"/>
  <text x="410" y="105" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">granted</text>
  <text x="410" y="124" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="11" fill="#dceaf5">usar la API directamente</text>

  <!-- permanentlyDenied -->
  <rect x="320" y="250" width="200" height="80" rx="12" fill="#1b232c" stroke="#e57373" stroke-width="2"/>
  <text x="420" y="285" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#f2b8b5">permanentlyDenied</text>
  <text x="420" y="304" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="11" fill="#d9a8a6">request() ya no muestra diálogo</text>

  <!-- openAppSettings -->
  <rect x="600" y="250" width="180" height="80" rx="12" fill="#1b232c" stroke="#3a4552" stroke-width="2"/>
  <text x="690" y="285" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#e8edf2">openAppSettings()</text>
  <text x="690" y="304" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="11" fill="#9fb0bf">único camino de vuelta</text>

  <!-- arrows -->
  <path d="M 220 185 C 260 150, 280 130, 322 110" stroke="#54C5F8" stroke-width="2" fill="none"/>
  <polygon points="322,110 308,108 314,122" fill="#54C5F8"/>
  <text x="255" y="145" font-family="Inter, Roboto, system-ui, sans-serif" font-size="11" fill="#9fb0bf">.request()</text>

  <path d="M 220 215 C 260 245, 280 265, 322 285" stroke="#e57373" stroke-width="2" fill="none"/>
  <polygon points="322,285 310,275 308,290" fill="#e57373"/>
  <text x="248" y="265" font-family="Inter, Roboto, system-ui, sans-serif" font-size="11" fill="#d9a8a6">"no volver a preguntar"</text>

  <path d="M 130 160 C 100 130, 100 100, 130 90" stroke="#6b7a89" stroke-width="2" stroke-dasharray="5 5" fill="none"/>
  <text x="20" y="115" font-family="Inter, Roboto, system-ui, sans-serif" font-size="10" fill="#6b7a89">re-pedir si</text>
  <text x="20" y="128" font-family="Inter, Roboto, system-ui, sans-serif" font-size="10" fill="#6b7a89">sigue denied</text>

  <path d="M 520 290 L 598 290" stroke="#e57373" stroke-width="2" fill="none"/>
  <polygon points="598,290 584,284 584,296" fill="#e57373"/>

  <path d="M 690 250 C 690 190, 550 140, 502 108" stroke="#6b7a89" stroke-width="2" stroke-dasharray="5 5" fill="none"/>
  <polygon points="500,106 512,110 508,124" fill="#6b7a89"/>
  <text x="600" y="180" font-family="Inter, Roboto, system-ui, sans-serif" font-size="10" fill="#6b7a89">si el usuario concede</text>
  <text x="600" y="193" font-family="Inter, Roboto, system-ui, sans-serif" font-size="10" fill="#6b7a89">el permiso en Ajustes</text>

  <text x="410" y="370" text-anchor="middle" font-family="Inter, Roboto, system-ui, sans-serif"
        font-size="12" fill="#6b7a89">El único camino de vuelta desde permanentlyDenied es que el usuario cambie el permiso manualmente en Ajustes.</text>
</svg>
