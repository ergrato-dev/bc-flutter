<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <title>Ciclo de vida de un mensaje FCM según el estado de la app</title>
  <desc>Un mensaje FCM enviado desde el backend llega a la app en uno de tres estados posibles —
    foreground, background o terminated — y cada uno dispara un callback distinto de
    firebase_messaging: onMessage, onMessageOpenedApp o getInitialMessage.</desc>

  <rect width="1000" height="600" fill="#0d1117"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#54C5F8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Mensaje FCM según el estado de la app</text>

  <!-- Source node -->
  <rect x="400" y="70" width="200" height="60" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="2"/>
  <text x="500" y="95" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Backend / Firebase Console</text>
  <text x="500" y="115" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">envía mensaje FCM</text>

  <!-- Branch lines -->
  <line x1="500" y1="130" x2="500" y2="160" stroke="#54C5F8" stroke-width="2"/>
  <line x1="500" y1="160" x2="170" y2="160" stroke="#54C5F8" stroke-width="2"/>
  <line x1="500" y1="160" x2="830" y2="160" stroke="#54C5F8" stroke-width="2"/>
  <line x1="170" y1="160" x2="170" y2="190" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="160" x2="500" y2="190" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="160" x2="830" y2="190" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Foreground column -->
  <rect x="60" y="190" width="220" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="170" y="220" fill="#3fb950" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Foreground</text>
  <text x="170" y="240" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">app abierta y visible</text>
  <text x="170" y="258" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">no muestra nada solo</text>

  <line x1="170" y1="270" x2="170" y2="310" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="30" y="310" width="280" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="170" y="338" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">FirebaseMessaging.onMessage</text>
  <text x="170" y="358" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">tu código muestra la notificación</text>
  <text x="170" y="374" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">(flutter_local_notifications)</text>

  <!-- Background column -->
  <rect x="390" y="190" width="220" height="80" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="500" y="220" fill="#d29922" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Background</text>
  <text x="500" y="240" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">minimizada, en memoria</text>
  <text x="500" y="258" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">SO muestra en bandeja</text>

  <line x1="500" y1="270" x2="500" y2="310" stroke="#d29922" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="310" width="280" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="333" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">onMessageOpenedApp</text>
  <text x="500" y="352" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">al TOCAR la notificación —</text>
  <text x="500" y="368" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">útil para deep linking</text>

  <!-- Terminated column -->
  <rect x="720" y="190" width="220" height="80" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="830" y="220" fill="#f85149" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Terminated</text>
  <text x="830" y="240" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">app cerrada por completo</text>
  <text x="830" y="258" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">SO muestra en bandeja</text>

  <line x1="830" y1="270" x2="830" y2="310" stroke="#f85149" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="690" y="310" width="280" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="830" y="333" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">getInitialMessage()</text>
  <text x="830" y="352" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">se consulta UNA VEZ al</text>
  <text x="830" y="368" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">arrancar, antes del router</text>

  <!-- Footer note -->
  <rect x="150" y="430" width="700" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="500" y="460" fill="#54C5F8" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Función top-level en background</text>
  <text x="500" y="485" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">FirebaseMessaging.onBackgroundMessage(handler) corre en un isolate propio,</text>
  <text x="500" y="505" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">sin acceso a BuildContext ni al estado de los widgets — solo al mensaje.</text>
  <text x="500" y="525" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Debe declararse fuera de cualquier clase, con @pragma('vm:entry-point').</text>
</svg>
