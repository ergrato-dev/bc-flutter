<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <title>Flujo desde el toque de la notificación hasta la navegación</title>
  <desc>El usuario toca una notificación push; la app lee el itemId del data payload del
    mensaje, decide el callback según si venía de background o terminated, y navega con
    go_router a la pantalla de detalle correspondiente.</desc>

  <rect width="900" height="380" fill="#0d1117"/>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#54C5F8"/>
    </marker>
  </defs>

  <text x="450" y="36" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Deep linking al tocar una notificación</text>

  <!-- Step 1 -->
  <rect x="30" y="70" width="150" height="90" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="2"/>
  <text x="105" y="100" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Usuario toca</text>
  <text x="105" y="118" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">la notificación</text>
  <text x="105" y="140" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">bandeja del sistema</text>

  <line x1="180" y1="115" x2="215" y2="115" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 2 -->
  <rect x="220" y="70" width="180" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="310" y="98" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">¿La app ya vivía</text>
  <text x="310" y="114" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">en memoria?</text>
  <text x="310" y="136" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">background vs.</text>
  <text x="310" y="150" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">terminated</text>

  <!-- Branch Sí -->
  <line x1="400" y1="95" x2="440" y2="95" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="418" y="86" fill="#3fb950" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Sí</text>
  <rect x="440" y="60" width="210" height="70" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="545" y="86" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">onMessageOpenedApp</text>
  <text x="545" y="106" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">emite message.data</text>
  <text x="545" y="120" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">de inmediato</text>

  <!-- Branch No -->
  <line x1="400" y1="140" x2="440" y2="180" stroke="#f85149" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="418" y="165" fill="#f85149" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">No</text>
  <rect x="440" y="180" width="210" height="70" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="545" y="206" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">getInitialMessage()</text>
  <text x="545" y="226" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">se consulta antes de</text>
  <text x="545" y="240" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">montar MaterialApp.router</text>

  <!-- Merge to payload -->
  <line x1="650" y1="95" x2="700" y2="95" stroke="#54C5F8" stroke-width="2"/>
  <line x1="700" y1="95" x2="700" y2="150" stroke="#54C5F8" stroke-width="2"/>
  <line x1="650" y1="215" x2="700" y2="215" stroke="#54C5F8" stroke-width="2"/>
  <line x1="700" y1="215" x2="700" y2="160" stroke="#54C5F8" stroke-width="2"/>
  <line x1="700" y1="155" x2="740" y2="155" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Step 3: payload -->
  <rect x="740" y="110" width="130" height="90" rx="8" fill="#161b22" stroke="#54C5F8" stroke-width="2"/>
  <text x="805" y="138" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">data payload</text>
  <text x="805" y="158" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">{'type':</text>
  <text x="805" y="172" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">'item_detail',</text>
  <text x="805" y="186" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">'itemId': '42'}</text>

  <!-- Bottom: navigation result -->
  <line x1="805" y1="200" x2="805" y2="240" stroke="#54C5F8" stroke-width="2"/>
  <line x1="805" y1="240" x2="105" y2="240" stroke="#54C5F8" stroke-width="2"/>
  <line x1="105" y1="240" x2="105" y2="270" stroke="#54C5F8" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="20" y="270" width="860" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="300" fill="#54C5F8" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">router.push('/items/${data['itemId']}')</text>
  <text x="450" y="322" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">go_router navega a DetailScreen con el itemId leído del payload —</text>
  <text x="450" y="340" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">nunca se parsea el texto visible de la notificación (notification.body)</text>
</svg>
