<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <title>Pirámide de testing: muchos unit tests, menos widget tests, pocos integration tests</title>
  <desc>Pirámide de tres niveles que ilustra la proporción recomendada de tests: una base ancha
    de unit tests rápidos y baratos, una capa media de widget tests, y una punta angosta de
    integration tests, lentos y costosos de mantener.</desc>

  <rect width="800" height="520" fill="#0d1117"/>

  <text x="400" y="40" fill="#ffffff" font-size="22" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Pirámide de Testing</text>

  <!-- Integration tier (top, narrow) -->
  <polygon points="350,80 450,80 420,180 380,180" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="400" y="135" fill="#f85149" font-size="14" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Integration</text>
  <text x="400" y="155" fill="#8b949e" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">pocos</text>

  <!-- Widget tier (middle) -->
  <polygon points="380,180 420,180 480,300 320,300" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="400" y="245" fill="#d29922" font-size="15" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Widget</text>
  <text x="400" y="266" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">algunos</text>

  <!-- Unit tier (bottom, wide) -->
  <polygon points="320,300 480,300 560,440 240,440" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="400" y="375" fill="#3fb950" font-size="17" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Unit</text>
  <text x="400" y="398" fill="#8b949e" font-size="13" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">muchos, rápidos, baratos</text>

  <!-- Side annotations -->
  <line x1="565" y1="130" x2="620" y2="130" stroke="#f85149" stroke-width="1.5"/>
  <text x="628" y="122" fill="#ffffff" font-size="12" font-family="system-ui, -apple-system, sans-serif">app completa,</text>
  <text x="628" y="138" fill="#ffffff" font-size="12" font-family="system-ui, -apple-system, sans-serif">dispositivo real</text>

  <line x1="490" y1="240" x2="620" y2="240" stroke="#d29922" stroke-width="1.5"/>
  <text x="628" y="232" fill="#ffffff" font-size="12" font-family="system-ui, -apple-system, sans-serif">pumpWidget,</text>
  <text x="628" y="248" fill="#ffffff" font-size="12" font-family="system-ui, -apple-system, sans-serif">sin GPU real</text>

  <line x1="565" y1="370" x2="620" y2="370" stroke="#3fb950" stroke-width="1.5"/>
  <text x="628" y="362" fill="#ffffff" font-size="12" font-family="system-ui, -apple-system, sans-serif">use cases,</text>
  <text x="628" y="378" fill="#ffffff" font-size="12" font-family="system-ui, -apple-system, sans-serif">lógica pura</text>

  <!-- Footer -->
  <rect x="120" y="460" width="560" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="487" fill="#8b949e" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Invertir la pirámide (muchos E2E, pocos unit) hace la suite lenta y frágil.</text>
</svg>
