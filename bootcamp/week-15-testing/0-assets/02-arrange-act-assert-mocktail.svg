<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <title>Flujo Arrange-Act-Assert con un mock de mocktail</title>
  <desc>Secuencia de un unit test con mocktail: se programa el comportamiento del mock con
    when(), se ejecuta el use case bajo prueba, el use case llama al repository mockeado que
    responde con el valor programado, y el test verifica el resultado con expect o verify.</desc>

  <rect width="900" height="380" fill="#0d1117"/>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#54C5F8"/>
    </marker>
  </defs>

  <text x="450" y="36" fill="#ffffff" font-size="20" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Arrange → Act → Assert</text>

  <!-- Lane headers -->
  <text x="130" y="70" fill="#54C5F8" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Test</text>
  <text x="450" y="70" fill="#54C5F8" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">GetItems (use case)</text>
  <text x="770" y="70" fill="#54C5F8" font-size="13" font-weight="bold" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">MockItemsRepository</text>

  <!-- Lane lines -->
  <line x1="130" y1="80" x2="130" y2="340" stroke="#30363d" stroke-width="1"/>
  <line x1="450" y1="80" x2="450" y2="340" stroke="#30363d" stroke-width="1"/>
  <line x1="770" y1="80" x2="770" y2="340" stroke="#30363d" stroke-width="1"/>

  <!-- ARRANGE -->
  <rect x="40" y="95" width="820" height="45" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="60" y="122" fill="#3fb950" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">ARRANGE</text>
  <line x1="130" y1="117" x2="770" y2="117" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="450" y="112" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">when(() =&gt; repo.getItems()).thenAnswer(...)</text>

  <!-- ACT -->
  <rect x="40" y="155" width="820" height="90" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="60" y="182" fill="#d29922" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">ACT</text>
  <line x1="130" y1="200" x2="450" y2="200" stroke="#d29922" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="290" y="193" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">await useCase()</text>
  <line x1="450" y1="222" x2="770" y2="222" stroke="#d29922" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="610" y="215" fill="#ffffff" font-size="11" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">repository.getItems()</text>
  <line x1="770" y1="238" x2="450" y2="238" stroke="#d29922" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="610" y="234" fill="#8b949e" font-size="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">retorna la lista programada</text>

  <!-- ASSERT -->
  <rect x="40" y="265" width="820" height="70" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="60" y="292" fill="#f85149" font-size="12" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">ASSERT</text>
  <text x="450" y="300" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">expect(result, hasLength(1))</text>
  <text x="450" y="320" fill="#ffffff" font-size="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">verify(() =&gt; repository.getItems()).called(1)</text>
</svg>
